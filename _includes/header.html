<header class="site-header">
  <a class="brand" href="{{ '/' | relative_url }}" aria-label="Corsa home">
    <img src="{{ 'assets/images/logos/corsa-logo.png' | relative_url }}" alt="Corsa" />
  </a>

  <nav class="main-nav" aria-label="Main navigation">
    <div id="catalog"
      {% if page.url == "/catalog/" or page.url == "/" %} class="nav-item active"
      {% else %} class="nav-item"
      {% endif %}>
      <a href="{{ 'catalog' | relative_url }}">Catalog</a>
    </div>

    <div id="explore"
      {% if page.url contains "/explore/" %} class="nav-item active has-dropdown"
      {% else %} class="nav-item has-dropdown"
      {% endif %}>
      <a href="{{ 'explore' | relative_url }}">Explore</a>
      <div class="site-dropdown" aria-label="Explore menu">
        <a {% if page.url contains "/explore/dependencies/" %}class="active"{% endif %} href="{{ 'explore/dependencies' | relative_url }}">Dependencies</a>
        <a {% if page.url contains "/explore/spack-dependencies/" %}class="active"{% endif %} href="{{ 'explore/spack-dependencies' | relative_url }}">Spack Dependencies</a>
        <a {% if page.url contains "/explore/project-metrics/" %}class="active"{% endif %} href="{{ 'explore/project-metrics' | relative_url }}">Project Metric Visualizer</a>
        <a {% if page.url contains "/explore/dependents/" %}class="active"{% endif %} href="{{ 'explore/dependents' | relative_url }}">Project Dependent Visualizer</a>
      </div>
    </div>

    <div id="about"
      {% if page.url contains "/about/" %} class="nav-item active has-dropdown"
      {% else %} class="nav-item has-dropdown"
      {% endif %}>
      <a href="{{ 'about' | relative_url }}">About</a>
      <div class="site-dropdown" aria-label="About menu">
        <a {% if page.url contains "/about/faq/" %}class="active"{% endif %} href="{{ 'about/faq' | relative_url }}">FAQ</a>
        <a {% if page.url contains "/about/licenses/" %}class="active"{% endif %} href="{{ 'about/licenses' | relative_url }}">Licenses Guide</a>
      </div>
    </div>

    <div id="news"
      {% if page.url contains "/news/" %} class="nav-item active has-dropdown"
      {% else %} class="nav-item has-dropdown"
      {% endif %}>
      <a href="{{ 'news' | relative_url }}">News</a>
      <div class="site-dropdown" aria-label="News menu">
        <a {% if page.url contains "/news/archive/" %}class="active"{% endif %} href="{{ 'news/archive' | relative_url }}">Archive</a>
      </div>
    </div>

    <a class="icon-link" href="https://github.com/cass-community" aria-label="GitHub">
      <img src="{{ 'assets/images/github-icon.svg' | relative_url }}" alt="" aria-hidden="true" />
    </a>
    <a class="icon-link" href="https://twitter.com/{{ site.twitter.username }}" aria-label="Twitter">
      <span class="fa fa-twitter fa-lg" aria-hidden="true"></span>
    </a>
  </nav>
</header>
